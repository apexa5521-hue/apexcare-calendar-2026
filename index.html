<script>
/* ══ SAFE DOM HELPERS ════════════════════════════ */
const $e = id => document.getElementById(id);
const $t = (id,v) => { const e=$e(id); if(e) e.textContent=v; };
const $h = (id,v) => { const e=$e(id); if(e) e.innerHTML=v; };
const $s = (id,p,v) => { const e=$e(id); if(e) e.style[p]=v; };
const $c = (id,cls,add) => { const e=$e(id); if(e) e.classList[add?'add':'remove'](cls); };

/* ══ JSONP HELPERS ══════════════════════════════ */
function gasWrite(params, onDone) {
 if (!GAS_URL) { 
   console.warn('[GAS] no URL configured'); 
   if (onDone) onDone(false);
   return;
 }
 const cb = '__w_' + Date.now();
 const sc = document.createElement('script');
 const timer = setTimeout(() => {
  delete window[cb]; sc.remove();
  console.warn('[GAS] write timeout:', params.action);
  if (onDone) onDone(false);
 }, 15000);
 
 window[cb] = (r) => {
  clearTimeout(timer); 
  delete window[cb]; 
  sc.remove();
  console.log('[GAS] write success:', params.action, r);
  if (onDone) onDone(r && r.ok);
 };
 
 const p = {};
 Object.keys(params).forEach(k => { 
   if (k !== 'ts') p[k] = params[k]; 
 });
 if (p.text && p.text.length > 500) p.text = p.text.slice(0, 500);
 p.callback = cb;
 
 const url = GAS_URL + '?' + new URLSearchParams(p).toString();
 console.log('[GAS] sending:', params.action);
 sc.src = url;
 document.head.appendChild(sc);
}

function gasRead(params, onDone) {
 if (!GAS_URL) { 
   console.warn('[GAS] no URL configured');
   if (onDone) onDone(null);
   return;
 }
 
 const cb = '__r_' + Date.now();
 const sc = document.createElement('script');
 const timer = setTimeout(() => {
  delete window[cb]; 
  sc.remove();
  console.warn('[GAS] read timeout');
  if (onDone) onDone(null);
 }, 12000);
 
 window[cb] = (data) => {
  clearTimeout(timer); 
  delete window[cb]; 
  sc.remove();
  console.log('[GAS] read success, notes count:', data?.notes?.length || 0);
  if (onDone) onDone(data);
 };
 
 const p = Object.assign({}, params, { 
   callback: cb, 
   t: Date.now() 
 });
 
 const url = GAS_URL + '?' + new URLSearchParams(p).toString();
 sc.src = url;
 document.head.appendChild(sc);
}

/* ══ LOCAL STORAGE ═══════════════════════════════ */
const LS_KEY = 'apx_notes_2026';

function lsSave() {
 try {
  const toSave = {};
  Object.keys(localNotes).forEach(id => {
   toSave[id] = localNotes[id];
  });
  localStorage.setItem(LS_KEY, JSON.stringify(toSave));
  console.log('[LS] saved', Object.keys(toSave).length, 'notes');
 } catch(e) { 
   console.warn('[LS] save failed:', e); 
 }
}

function lsLoad() {
 try {
  const raw = localStorage.getItem(LS_KEY);
  if (raw) {
   const parsed = JSON.parse(raw);
   let count = 0;
   Object.keys(parsed).forEach(id => {
    if (parsed[id]?.id && parsed[id]?.date && parsed[id]?.text) {
     localNotes[id] = parsed[id];
     count++;
    }
   });
   console.log('[LS] loaded', count, 'notes');
  }
 } catch(e) { 
   console.warn('[LS] load failed:', e); 
 }
}

function lsDelete(id) {
 try {
  delete localNotes[id];
  lsSave();
 } catch(e) {
   console.warn('[LS] delete failed:', e);
 }
}

/* ══ CONFIG ══════════════════════════════════════ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxCak44HTXlD3p9sJ-j_eEtXNRcSbeW0MpmyGYsBJ1cS3dfv1XIfGa1JrQv3Zew9imK/exec';

const PINS = {
 ceo: '1111',
 marketing: '2222',
 hr: '3333',
 ops: '4444',
 quality: '5555',
 general: '0000',
};

const ROLE_META = {
  ceo:       {n:'المدير التنفيذي', abbr:'CEO', bg:'#c0152a', canWrite:true,  seesAll:true},
  marketing: {n:'التسويق',         abbr:'MKT', bg:'#8b5cf6', canWrite:true,  seesAll:false},
  hr:        {n:'الموارد البشرية', abbr:'HR',  bg:'#10b981', canWrite:true,  seesAll:false},
  ops:       {n:'العمليات',        abbr:'OPS', bg:'#f97316', canWrite:true,  seesAll:false},
  quality:   {n:'الجودة',          abbr:'QA',  bg:'#06b6d4', canWrite:true,  seesAll:false},
  general:   {n:'عام',             abbr:'GEN', bg:'#6b7280', canWrite:false, seesAll:false},
};

const MONTHS_AR=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS_AR=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

/* ══ STATE ═══════════════════════════════════════ */
let currentRole = null;
let notesMap  = {};
let allNotes  = [];
let localNotes = {};
let pendingIds = new Set();
let curDay = null;
let selTo_val = 'all';
let selColor_val = '#f59e0b';
let readIds = new Set(JSON.parse(localStorage.getItem('apex_read')||'[]'));
let inboxFilter = 'all';

/* ══ LOGIN ═══════════════════════════════════════ */
let selectedRoleEl = null;

function selectRole(el) {
 document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
 el.classList.add('selected');
 selectedRoleEl = el;
 $t('pinLabel', 'أدخل رقم السري لـ ' + (ROLE_META[el.dataset.role]?.n||''));
 $e('pinField').value='';
 $e('pinField').focus();
 $s('pinErr','display','none');
}

function doLogin() {
 if (!selectedRoleEl) { 
   showToast('اختر حسابك أولاً','#f59e0b'); 
   return; 
 }
 
 const role = selectedRoleEl.dataset.role;
 const pin = $e('pinField').value;
 
 if (pin !== PINS[role]) {
  $s('pinErr','display','block');
  $e('pinField').value='';
  $e('pinField').focus();
  setTimeout(()=>$s('pinErr','display','none'),2000);
  return;
 }
 
 currentRole = role;
 const rm = ROLE_META[role];
 
 $c('loginScreen','gone',true);
 $c('appShell','visible',true);
 $t('tbUser', '['+rm.abbr+'] '+rm.n);
 
 if (!rm.canWrite) $s('btnAddNote','display','none');
 
 // 1. Load from localStorage
 lsLoad();
 rebuildFromLocal();
 hideLoad('');
 
 // 2. Scroll to current month
 setTimeout(scrollToCurrentMonth, 300);
 
 // 3. Sync from sheet in background
 setTimeout(syncFromSheet, 800);
}

function rebuildFromLocal() {
 notesMap = {};
 const all = Object.values(localNotes);
 const roleObj = ROLE_META[currentRole];
 const seesAll = roleObj?.seesAll === true;

 const visible = all.filter(n => {
  if (!n?.date || !n?.text) return false;
  if (!currentRole) return false;
  if (seesAll) return true;
  if (n.from_role === currentRole) return true;
  if (n.to_role === currentRole) return true;
  if (n.to_role === 'all') return true;
  if (n.shared === 'yes') return true;
  return false;
 });

 console.log('[REBUILD] role:', currentRole, '| seesAll:', seesAll,
   '| total:', all.length, '| visible:', visible.length);

 allNotes = visible;
 
 visible.forEach(n => {
  if (!notesMap[n.date]) notesMap[n.date] = [];
  const exists = notesMap[n.date].some(x => x.id === n.id);
  if (!exists) notesMap[n.date].push(n);
 });
 
 renderAllCells();
 updateInboxBadge();
}

function scrollToCurrentMonth() {
 const now = new Date();
 const month = now.getMonth() + 1;
 const year = now.getFullYear();
 
 let target = 1;
 if (year === 2026) target = month;
 else if (year > 2026) target = 12;
 
 const el = $e('m' + target);
 if (el) {
  const offset = 56 + 40 + 8;
  const top = el.getBoundingClientRect().top + window.scrollY - offset;
  window.scrollTo({ top, behavior: 'smooth' });
  
  const today = year + '-' + String(month).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const todayCell = document.querySelector('[data-date="' + today + '"]');
  if (todayCell) {
   todayCell.style.outline = '2px solid var(--teal)';
   todayCell.style.outlineOffset = '-2px';
   todayCell.style.borderRadius = '2px';
  }
 }
}

function logout() {
 currentRole = null;
 $c('loginScreen','gone',false);
 $c('appShell','visible',false);
 $e('pinField').value='';
 document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
 selectedRoleEl=null;
 notesMap={};
 allNotes=[];
 localNotes={};
 pendingIds.clear();
}

/* ══ SYNC FROM SHEET ════════════════════════════ */
function syncFromSheet() {
 if (!GAS_URL) {
   console.warn('[SYNC] no GAS_URL configured');
   return;
 }
 
 console.log('[SYNC] fetching from sheet as:', currentRole);
 
 gasRead({action:'getAll', viewer: currentRole}, data => {
  if (data?.ok && data?.notes) {
   console.log('[SYNC] received', data.notes.length, 'notes from sheet');
   processNotes(data.notes);
  } else {
   console.error('[SYNC] failed or empty:', data);
  }
 });
}

function processNotes(remoteNotes) {
 if (!Array.isArray(remoteNotes)) {
   console.warn('[PROCESS] invalid notes data');
   return;
 }
 
 console.log('[PROCESS] processing', remoteNotes.length, 'notes from sheet');
 
 let addedCount = 0;
 
 remoteNotes.forEach(n => {
  if (!n?.id || !n?.date || !n?.text) return;
  
  // Check visibility
  const roleObj = ROLE_META[currentRole];
  const seesAll = roleObj?.seesAll === true;
  
  let canSee = false;
  if (seesAll) canSee = true;
  else if (n.from_role === currentRole) canSee = true;
  else if (n.to_role === currentRole) canSee = true;
  else if (n.to_role === 'all') canSee = true;
  else if (n.shared === 'yes') canSee = true;
  
  if (canSee) {
   localNotes[n.id] = n;
   pendingIds.delete(n.id);
   addedCount++;
  }
 });
 
 console.log('[PROCESS] added/updated', addedCount, 'notes to local storage');
 
 lsSave();
 rebuildFromLocal();
}

/* ══ MANUAL IMPORT ══════════════════════════════ */
function doImport() {
 if (!GAS_URL) { 
   showToast('اضبط GAS_URL في الكود','#f59e0b'); 
   return; 
 }
 
 $c('loadScreen','gone',false);
 $t('loadTxt','جاري الاستيراد من Google Sheets...');
 
 console.log('[IMPORT] manual import started, role:', currentRole);
 
 gasRead({action:'getAll', viewer: currentRole}, data => {
  hideLoad('');
  
  if (data?.ok && data?.notes) {
   console.log('[IMPORT] received', data.notes.length, 'notes');
   
   if (data.notes.length === 0) {
    showToast('لا توجد ملاحظات في الشيت','#6b7280');
   } else {
     processNotes(data.notes);
     showToast('تم الاستيراد: ' + data.notes.length + ' ملاحظة','#10b981');
   }
  } else {
   console.error('[IMPORT] failed:', data);
   showToast('فشل الاستيراد - تحقق من الاتصال','#ef4444');
  }
 });
}

function hideLoad(msg) {
 const ls = $e('loadScreen');
 const lt = $e('loadTxt');
 if (lt && msg) lt.textContent = msg;
 setTimeout(() => ls && ls.classList.add('gone'), msg ? 700 : 0);
}

/* ══ RENDER CELLS ════════════════════════════════ */
function renderAllCells() {
 Object.keys(notesMap).forEach(renderCell);
 document.querySelectorAll('.nw-wrap').forEach(el=>{
  const date = el.id.replace('nw-','');
  if (!notesMap[date]) el.innerHTML = '';
 });
}

function renderCell(date) {
 const el = $e('nw-'+date);
 if (!el) return;
 
 const notes = notesMap[date] || [];
 
 el.innerHTML = notes.map(n => {
  const isUnread = !readIds.has(n.id) && n.from_role !== currentRole;
  const rm = ROLE_META[n.from_role] || ROLE_META.general;
  const label = n.text.slice(0,16) + (n.text.length>16?'…':'');
  
  return `<div class="note-chip"
   style="background:${n.color}18;color:${n.color};border-right-color:${n.color}"
   onclick="event.stopPropagation();viewNote('${date}','${n.id}')"
   title="${n.text} — ${rm.n}">
   ${isUnread?'<span style="width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0"></span>':''}
   <span style="overflow:hidden;text-overflow:ellipsis;flex:1;font-size:7.5px">${label}</span>
   <span style="font-size:6px;opacity:.6;flex-shrink:0;background:${n.color}25;padding:0 3px;border-radius:2px">${rm.abbr}</span>
  </div>`;
 }).join('');
}

/* ══ CELL TAP ════════════════════════════════════ */
function cellTap(td) {
 if (td.classList.contains('emp')) return;
 
 curDay = td.dataset.date;
 const notes = notesMap[curDay] || [];
 
 if (notes.length) {
  openDayModal(curDay);
 } else if (ROLE_META[currentRole]?.canWrite) {
  showAddNote(curDay);
 } else {
  showToast('لا توجد ملاحظات لهذا اليوم','#6b7280');
 }
}

/* ══ DAY NOTES MODAL ═════════════════════════════ */
function openDayModal(date) {
 curDay = date;
 const [y,m,d] = date.split('-').map(Number);
 const dow = new Date(y,m-1,d).getDay();
 
 $t('dayTitle', DAYS_AR[dow]+'، '+d+' '+MONTHS_AR[m-1]+' 2026م');
 $t('daySub', date);
 
 renderDayNotes();
 showOv('ovDay');
 
 (notesMap[date]||[]).forEach(n => {
   readIds.add(n.id);
 });
 localStorage.setItem('apex_read',JSON.stringify([...readIds]));
 updateInboxBadge();
 renderCell(date);
}

function renderDayNotes() {
 const notes = notesMap[curDay] || [];
 const el = $e('dayNoteList');
 
 if (!notes.length) {
  el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:8px;font-size:13px">لا توجد ملاحظات لهذا اليوم</div>';
  return;
 }
 
 el.innerHTML = notes.map(n => buildNoteItem(n,true)).join('');
}

function viewNote(date,id) {
 curDay = date;
 const n = (notesMap[date]||[]).find(x => x.id === id);
 if (!n) return;
 
 readIds.add(id);
 localStorage.setItem('apex_read',JSON.stringify([...readIds]));
 updateInboxBadge();
 renderCell(date);
 openDayModal(date);
}

function openAddForDay() {
 closeOv('ovDay');
 showAddNote(curDay);
}

/* ══ BUILD NOTE ITEM ═════════════════════════════ */
function buildNoteItem(n, showDel) {
 const fromMeta = ROLE_META[n.from_role] || {n:'غير محدد',bg:'#888',abbr:'?'};
 const toMeta = ROLE_META[n.to_role] || {n:'الكل',bg:'#6b7280',abbr:'ALL'};
 const canDel = showDel && (n.from_role===currentRole || ROLE_META[currentRole]?.seesAll);
 const [y,m,d] = n.date.split('-').map(Number);
 const dateStr = d+' '+MONTHS_AR[m-1];
 
 return `<div class="note-item">
 <div class="ni-dot" style="background:${n.color}"></div>
 <div class="ni-body">
 <div class="ni-text">${n.text}</div>
 <div class="ni-meta">
 <span class="ni-tag" style="background:${fromMeta.bg}22;color:${fromMeta.bg}">${fromMeta.abbr} ${fromMeta.n}</span>
 <span style="color:#94a3b8">&larr;</span>
 <span class="ni-tag" style="background:${toMeta.bg}22;color:${toMeta.bg}">${n.to_role==='all'?'الكل':toMeta.abbr+' '+toMeta.n}</span>
 <span style="color:#94a3b8">·</span>
 <span>${dateStr}</span>
 </div>
 </div>
 <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0">
   ${canDel ? '<button class="ni-del" onclick="deleteNote(\'' + n.date + '\',\''+n.id+'\')">&times;</button>' : ''}
   ${(ROLE_META[currentRole]?.seesAll && n.shared!=='yes') ? '<button class="ni-share" onclick="shareNote(\'' + n.date + '\',\''+n.id+'\')">مشاركة</button>' : ''}
   ${n.shared==='yes' ? '<span class="ni-shared-badge">مشترك</span>' : ''}
 </div>
 </div>`;
}

/* ══ INBOX ═══════════════════════════════════════ */
function showInbox() {
 inboxFilter = 'all';
 $t('inboxTitle', ROLE_META[currentRole]?.seesAll ? 'جميع الملاحظات' : 'الوارد والصادر');
 
 document.querySelectorAll('[data-if]').forEach(b=>{
   b.style.background='';
   b.style.color='';
   b.style.borderColor='';
 });
 
 const allIfBtn = document.querySelector('[data-if="all"]');
 if (allIfBtn) {
   allIfBtn.style.background='var(--ind)';
   allIfBtn.style.color='#fff';
   allIfBtn.style.borderColor='var(--ind)';
 }
 
 renderInbox();
 showOv('ovInbox');
}

function filterInbox(btn) {
 inboxFilter = btn.dataset.if;
 
 document.querySelectorAll('[data-if]').forEach(b=>{
   b.style.background='';
   b.style.color='';
 });
 
 btn.style.background = btn.style.borderColor = 'var(--ind)';
 btn.style.color = '#fff';
 
 renderInbox();
}

function renderInbox() {
 let notes = [...allNotes];
 
 if (inboxFilter === 'unread') {
   notes = notes.filter(n => !readIds.has(n.id) && n.from_role !== currentRole);
 }
 if (inboxFilter === 'sent') {
   notes = notes.filter(n => n.from_role === currentRole);
 }
 
 notes.sort((a,b) => b.date.localeCompare(a.date) || (b.ts||'').localeCompare(a.ts||''));
 
 const el = $e('inboxList');
 
 if (!notes.length) {
  el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:16px;font-size:13px">لا توجد ملاحظات</div>';
  return;
 }
 
 el.innerHTML = notes.map(n => buildNoteItem(n,false)).join('');
}

function updateInboxBadge() {
 const unread = allNotes.filter(n => !readIds.has(n.id) && n.from_role !== currentRole).length;
 const badge = $e('inboxBadge');
 
 if (badge) {
  badge.style.display = unread ? 'flex' : 'none';
  badge.textContent = unread;
 }
}

/* ══ ADD NOTE ════════════════════════════════════ */
function showAddNote(date) {
 if (!ROLE_META[currentRole]?.canWrite) { 
   showToast('حسابك للعرض فقط','#f59e0b'); 
   return; 
 }
 
 $e('nDate').value = date || '';
 $e('nText').value = '';
 selTo_val = 'all';
 
 document.querySelectorAll('.ttab').forEach(b=>{
   b.style.background='';
   b.style.color='';
   b.style.borderColor='';
 });
 
 const allBtn = document.querySelector('.ttab[data-to="all"]');
 if (allBtn) {
   allBtn.style.background='var(--ind)';
   allBtn.style.color='#fff';
   allBtn.style.borderColor='var(--ind)';
 }
 
 document.querySelectorAll('[data-to]').forEach(btn=>{
   btn.style.display = (btn.dataset.to === currentRole) ? 'none' : '';
 });
 
 selColor_val = '#f59e0b';
 document.querySelectorAll('.co').forEach(c => c.classList.remove('sel'));
 document.querySelector('.co[data-c="#f59e0b"]')?.classList.add('sel');
 
 showOv('ovAdd');
}

function selTo(el) {
 document.querySelectorAll('[data-to]').forEach(b=>{
   b.style.background='';
   b.style.color='';
   b.style.borderColor='';
 });
 
 el.style.background='var(--ind)';
 el.style.color='#fff';
 el.style.borderColor='var(--ind)';
 selTo_val = el.dataset.to;
}

function selColor(el) {
 document.querySelectorAll('.co').forEach(c => c.classList.remove('sel'));
 el.classList.add('sel'); 
 selColor_val = el.dataset.c;
}

function submitNote() {
 const date = $e('nDate')?.value || '';
 const text = $e('nText')?.value.trim() || '';
 
 if (!date) { 
   showToast('اختر تاريخاً','#f59e0b'); 
   return; 
 }
 if (!text) { 
   showToast('اكتب ملاحظتك','#f59e0b'); 
   return; 
 }

 const id = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
 const note = {
  id:        id,
  date:      date,
  text:      text,
  from_role: currentRole,
  to_role:   selTo_val,
  color:     selColor_val,
  shared:    'no',
  ts:        new Date().toISOString()
 };

 // Save locally immediately
 localNotes[id] = note;
 lsSave();
 pendingIds.add(id);
 
 // Rebuild and show
 rebuildFromLocal();
 closeOv('ovAdd');
 showToast('تم الحفظ محلياً','#10b981');

 // Send to sheet in background
 if (GAS_URL) {
  const params = {
   action:    'save',
   id:        note.id,
   date:      note.date,
   text:      note.text,
   from_role: note.from_role,
   to_role:   note.to_role,
   color:     note.color,
   shared:    'no'
  };
  
  console.log('[SUBMIT] sending note to sheet:', note.text.slice(0,25));
  
  function trySave(attempt) {
   gasWrite(params, ok => {
    if (ok) {
     pendingIds.delete(id);
     console.log('[SAVE] confirmed in sheet');
     showToast('تم الحفظ في Google Sheets','#10b981');
    } else if (attempt < 3) {
     console.warn('[SAVE] retry', attempt+1, 'of 3');
     setTimeout(() => trySave(attempt+1), (attempt+1) * 4000);
    } else {
     console.error('[SAVE] failed after 3 retries');
     showToast('محفوظة محلياً فقط - تحقق من الاتصال','#ef4444');
    }
   });
  }
  
  trySave(0);
 }
}

/* ══ SHARE NOTE ══════════════════════════════════ */
function shareNote(date, id) {
 if (!confirm('مشاركة هذه الملاحظة مع الجميع؟\nسيتمكن جميع الأقسام من رؤيتها.')) return;
 
 const note = (notesMap[date]||[]).find(n => n.id === id);
 if (note) note.shared = 'yes';
 
 const anote = allNotes.find(n => n.id === id);
 if (anote) anote.shared = 'yes';
 
 if (localNotes[id]) localNotes[id].shared = 'yes';
 
 lsSave();
 renderCell(date);
 renderDayNotes();
 showToast('تمت المشاركة مع الجميع','#10b981');
 
 if (GAS_URL) { 
   gasWrite({action:'share', id}); 
 }
}

/* ══ DELETE ══════════════════════════════════════ */
function deleteNote(date, id) {
 if (!confirm('حذف هذه الملاحظة؟')) return;
 
 if (notesMap[date]) {
  notesMap[date] = notesMap[date].filter(n => n.id !== id);
  if (!notesMap[date].length) delete notesMap[date];
 }
 
 allNotes = allNotes.filter(n => n.id !== id);
 lsDelete(id);
 
 renderCell(date);

/* ══ TOAST ═══════════════════════════════════════ */
let _toastTimer;
function showToast(msg, color) {
 const t = $e('toast');
 if (!t) return;
 
 t.textContent = msg;
 t.style.background = color === '#10b981' ? '#ecfdf5' : 
                      color === '#ef4444' ? '#fef2f2' : 
                      color === '#f59e0b' ? '#fffbeb' : '#1e293b';
 t.style.color = color;
 t.style.opacity = '1';
 
 clearTimeout(_toastTimer);
 _toastTimer = setTimeout(() => t.style.opacity = '0', 3000);
}

/* ══ OVERLAY HELPERS ═════════════════════════════ */
function showOv(id) { $c(id,'show',true); }
function closeOv(id) { $c(id,'show',false); }

/* ══ NAV HIGHLIGHT ═══════════════════════════════ */
const $cards = document.querySelectorAll('.mc');
const $links = document.querySelectorAll('#mnav .nv');

$cards.forEach(c => {
 new IntersectionObserver(entries => {
  entries.forEach(en => {
   if (en.isIntersecting) {
    $links.forEach(a => {
     const on = a.getAttribute('href') === '#' + c.id;
     a.classList.toggle('active', on);
     if (on) a.scrollIntoView({
       behavior:'smooth',
       inline:'nearest',
       block:'nearest'
     });
    });
   }
  });
 }, {
   rootMargin: `-96px 0px -55% 0px`,
   threshold: 0
 }).observe(c);
});

/* ══ AUTO REFRESH ════════════════════════════════ */

 if (currentRole && GAS_URL) syncFromSheet(); 
}, 60000);

document.addEventListener('visibilitychange', () => {
 if (!document.hidden && currentRole && GAS_URL) syncFromSheet();
});
